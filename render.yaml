services:
  - type: web
    name: complaintiq-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.deploy.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: BANK_NAME
        value: State Bank of India
